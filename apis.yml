    url: rules/vehicle-api-spectral-rules.yml
    title: Vehicle API Spectral Rules
  - type: Vocabulary
    url: vocabulary/vehicle-api-vocabulary.yml
    title: Vehicle API Vocabulary
  - type: NaftikoCapability
    url: capabilities/vehicle-data.yaml
    title: Vehicle Data
  - type: Features
    data:
      - name: Vehicle Make and Model Data
        description: >-
          Comprehensive database of vehicle makes, models, and trim levels with
          OEM specifications, features, and configuration options.
      - name: True Market Value Pricing
        description: >-
          Edmunds TMV pricing data including new vehicle suggested retail, invoice
          prices, and used vehicle values by condition and mileage.
      - name: Vehicle Media
        description: >-
          Photo and video assets for vehicle makes, models, and trims including
          exterior, interior, color swatch, and 360-degree images.
      - name: Dealer Inventory
        description: >-
          Real-time dealer inventory search with make, model, year, zip code,
          radius, and price range filtering.
      - name: Incentives and Rebates
        description: >-
          Manufacturer incentives, rebates, financing offers, and lease programs
          by vehicle, region, and customer type.
      - name: Vehicle Reviews and Ratings
        description: >-
          Edmunds editorial reviews and consumer ratings for vehicle models
          including performance, comfort, value, and reliability scores.
  - type: UseCases
    data:
      - name: Automotive Shopping Tools
        description: >-
          Build vehicle search and comparison tools that let consumers filter
          by make, model, year, price, and features with TMV pricing guidance.
      - name: Dealer Management Systems
        description: >-
          Power dealer websites and CRM systems with accurate vehicle specs,
          pricing, and inventory data synced from Edmunds.
      - name: Vehicle Configurator
        description: >-
          Enable consumers to build and price vehicles with available trims,
          packages, options, and colors with live pricing calculations.
      - name: Used Car Valuation
        description: >-
          Integrate used vehicle pricing into trade-in calculators, appraisal
          tools, and consumer value estimators using TMV data.
  - type: Integrations
    data:
      - name: AutoTrader
        description: >-
          Cross-reference vehicle listings with AutoTrader inventory using
          Edmunds vehicle identifiers and specs for consistent data.
      - name: Cars.com
        description: >-
          Combine Edmunds vehicle data with Cars.com listings for enriched
          consumer shopping experiences.
      - name: Dealer CRM Systems
        description: >-
          Integrate vehicle specs and pricing into Salesforce, CDK, and Reynolds
          and Reynolds dealer management systems.


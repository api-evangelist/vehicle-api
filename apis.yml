apis:
  - aid: vehicle-api:vehicle-api
    name: Vehicle API (Edmunds)
    description: >-
      The Edmunds Vehicle API provides access to a comprehensive automotive data
      platform including vehicle makes, models, trims, configurations, specifications,
      media (photos and videos), True Market Value (TMV) pricing, dealer inventories,
      incentives, reviews, and consumer ratings. Ideal for building automotive
      shopping tools, vehicle comparison engines, and dealer management systems.

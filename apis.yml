aid: vehicle-api
name: Vehicle API
description: >-
  The Vehicle API by Edmunds provides comprehensive access to automotive datasets
  covering vehicle makes, models, trims, specs, media, pricing (TMV), incentives,
  dealer information, and reviews. Enables developers to build automotive shopping
  tools, vehicle configurators, and consumer research applications.

naftiko: 1.0.0-alpha2
info:
  label: Vehicle API (Edmunds) — Specs
  description: 'Vehicle API (Edmunds) — Specs. 1 operations. Lead operation: Vehicle API Get Style. Self-contained Naftiko
    capability covering one Vehicle Api business surface.'
  tags:
  - Vehicle Api
  - Specs
  created: '2026-05-19'
  modified: '2026-05-19'
binds:
- namespace: env
  keys:
    VEHICLE_API_API_KEY: VEHICLE_API_API_KEY
capability:
  consumes:
  - type: http
    namespace: vehicle-specs
    baseUri: https://api.edmunds.com/api
    description: Vehicle API (Edmunds) — Specs business capability. Self-contained, no shared references.
    resources:
    - name: vehicle-v2-styles-styleId
      path: /vehicle/v2/styles/{styleId}
      operations:
      - name: getstyle
        method: GET
        description: Vehicle API Get Style
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: styleId
          in: path
          type: integer
          description: Edmunds style ID
          required: true
        - name: view
          in: query
          type: string
          description: 'Response detail level: basic or full'
        - name: api_key
          in: query
          type: string
          description: Edmunds API key
          required: true
    authentication:
      type: apikey
      key: api_key
      value: '{{env.VEHICLE_API_API_KEY}}'
      placement: query
  exposes:
  - type: rest
    namespace: vehicle-specs-rest
    port: 8080
    description: REST adapter for Vehicle API (Edmunds) — Specs. One Spectral-compliant resource per consumed operation, prefixed
      with /v1.
    resources:
    - path: /v1/vehicle/v2/styles/{styleid}
      name: vehicle-v2-styles-styleid
      description: REST surface for vehicle-v2-styles-styleId.
      operations:
      - method: GET
        name: getstyle
        description: Vehicle API Get Style
        call: vehicle-specs.getstyle
        with:
          styleId: rest.styleId
          view: rest.view
          api_key: rest.api_key
        outputParameters:
        - type: object
          mapping: $.
  - type: mcp
    namespace: vehicle-specs-mcp
    port: 9090
    transport: http
    description: MCP adapter for Vehicle API (Edmunds) — Specs. One tool per consumed operation, routed inline through this
      capability's consumes block.
    tools:
    - name: vehicle-api-get-style
      description: Vehicle API Get Style
      hints:
        readOnly: true
        destructive: false
        idempotent: true
      call: vehicle-specs.getstyle
      with:
        styleId: tools.styleId
        view: tools.view
        api_key: tools.api_key
      outputParameters:
      - type: object
        mapping: $.

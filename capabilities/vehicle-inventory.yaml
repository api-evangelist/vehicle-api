naftiko: 1.0.0-alpha2
info:
  label: Vehicle API (Edmunds) — Inventory
  description: 'Vehicle API (Edmunds) — Inventory. 1 operations. Lead operation: Vehicle API Search Inventory. Self-contained
    Naftiko capability covering one Vehicle Api business surface.'
  tags:
  - Vehicle Api
  - Inventory
  created: '2026-05-19'
  modified: '2026-05-19'
binds:
- namespace: env
  keys:
    VEHICLE_API_API_KEY: VEHICLE_API_API_KEY
capability:
  consumes:
  - type: http
    namespace: vehicle-inventory
    baseUri: https://api.edmunds.com/api
    description: Vehicle API (Edmunds) — Inventory business capability. Self-contained, no shared references.
    resources:
    - name: vehicle-v2-inventory
      path: /vehicle/v2/inventory
      operations:
      - name: searchinventory
        method: GET
        description: Vehicle API Search Inventory
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: make
          in: query
          type: string
          description: Vehicle make nice name (e.g. toyota)
          required: true
        - name: model
          in: query
          type: string
          description: Vehicle model nice name (e.g. camry)
          required: true
        - name: year
          in: query
          type: integer
          description: Model year filter
        - name: zip
          in: query
          type: string
          description: 5-digit ZIP code for dealer search
          required: true
        - name: radius
          in: query
          type: integer
          description: Search radius in miles (default 50)
        - name: pageSize
          in: query
          type: integer
          description: Results per page (max 100)
        - name: pageNum
          in: query
          type: integer
          description: Page number (1-based)
        - name: api_key
          in: query
          type: string
          description: Edmunds API key
          required: true
    authentication:
      type: apikey
      key: api_key
      value: '{{env.VEHICLE_API_API_KEY}}'
      placement: query
  exposes:
  - type: rest
    namespace: vehicle-inventory-rest
    port: 8080
    description: REST adapter for Vehicle API (Edmunds) — Inventory. One Spectral-compliant resource per consumed operation,
      prefixed with /v1.
    resources:
    - path: /v1/vehicle/v2/inventory
      name: vehicle-v2-inventory
      description: REST surface for vehicle-v2-inventory.
      operations:
      - method: GET
        name: searchinventory
        description: Vehicle API Search Inventory
        call: vehicle-inventory.searchinventory
        with:
          make: rest.make
          model: rest.model
          year: rest.year
          zip: rest.zip
          radius: rest.radius
          pageSize: rest.pageSize
          pageNum: rest.pageNum
          api_key: rest.api_key
        outputParameters:
        - type: object
          mapping: $.
  - type: mcp
    namespace: vehicle-inventory-mcp
    port: 9090
    transport: http
    description: MCP adapter for Vehicle API (Edmunds) — Inventory. One tool per consumed operation, routed inline through
      this capability's consumes block.
    tools:
    - name: vehicle-api-search-inventory
      description: Vehicle API Search Inventory
      hints:
        readOnly: true
        destructive: false
        idempotent: true
      call: vehicle-inventory.searchinventory
      with:
        make: tools.make
        model: tools.model
        year: tools.year
        zip: tools.zip
        radius: tools.radius
        pageSize: tools.pageSize
        pageNum: tools.pageNum
        api_key: tools.api_key
      outputParameters:
      - type: object
        mapping: $.

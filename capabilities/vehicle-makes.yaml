naftiko: 1.0.0-alpha2
info:
  label: Vehicle API (Edmunds) — Makes
  description: 'Vehicle API (Edmunds) — Makes. 1 operations. Lead operation: Vehicle API List Makes. Self-contained Naftiko
    capability covering one Vehicle Api business surface.'
  tags:
  - Vehicle Api
  - Makes
  created: '2026-05-19'
  modified: '2026-05-19'
binds:
- namespace: env
  keys:
    VEHICLE_API_API_KEY: VEHICLE_API_API_KEY
capability:
  consumes:
  - type: http
    namespace: vehicle-makes
    baseUri: https://api.edmunds.com/api
    description: Vehicle API (Edmunds) — Makes business capability. Self-contained, no shared references.
    resources:
    - name: vehicle-v2-makes
      path: /vehicle/v2/makes
      operations:
      - name: listmakes
        method: GET
        description: Vehicle API List Makes
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: state
          in: query
          type: string
          description: 'Publication state filter: new, used, or future'
        - name: year
          in: query
          type: integer
          description: Filter by model year (4-digit year)
        - name: view
          in: query
          type: string
          description: 'Response detail level: basic or full'
        - name: api_key
          in: query
          type: string
          description: Edmunds API key
          required: true
    authentication:
      type: apikey
      key: api_key
      value: '{{env.VEHICLE_API_API_KEY}}'
      placement: query
  exposes:
  - type: rest
    namespace: vehicle-makes-rest
    port: 8080
    description: REST adapter for Vehicle API (Edmunds) — Makes. One Spectral-compliant resource per consumed operation, prefixed
      with /v1.
    resources:
    - path: /v1/vehicle/v2/makes
      name: vehicle-v2-makes
      description: REST surface for vehicle-v2-makes.
      operations:
      - method: GET
        name: listmakes
        description: Vehicle API List Makes
        call: vehicle-makes.listmakes
        with:
          state: rest.state
          year: rest.year
          view: rest.view
          api_key: rest.api_key
        outputParameters:
        - type: object
          mapping: $.
  - type: mcp
    namespace: vehicle-makes-mcp
    port: 9090
    transport: http
    description: MCP adapter for Vehicle API (Edmunds) — Makes. One tool per consumed operation, routed inline through this
      capability's consumes block.
    tools:
    - name: vehicle-api-list-makes
      description: Vehicle API List Makes
      hints:
        readOnly: true
        destructive: false
        idempotent: true
      call: vehicle-makes.listmakes
      with:
        state: tools.state
        year: tools.year
        view: tools.view
        api_key: tools.api_key
      outputParameters:
      - type: object
        mapping: $.
